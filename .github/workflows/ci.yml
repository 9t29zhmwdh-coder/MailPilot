name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  DATABASE_URL: sqlite:./ci_check.db

jobs:
  check:
    name: Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite
      - name: Prepare database
        run: |
          sqlx database create
          sqlx migrate run --source crates/mp-core/src/db/migrations
      - name: cargo check
        run: cargo check --workspace --exclude mailpilot
      - name: cargo clippy
        run: cargo clippy --workspace --exclude mailpilot -- -D warnings
      - name: cargo test
        run: cargo test --workspace --exclude mailpilot

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:./ci_check.db
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite
      - name: Prepare database
        run: |
          sqlx database create
          sqlx migrate run --source crates/mp-core/src/db/migrations
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Generate coverage
        run: cargo tarpaulin -p mp-core --out Xml --timeout 120
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      # RUSTSEC-2026-0194/-0195: quick-xml 0.39 DoS, transitive via plist->tauri;
      # patched only in quick-xml >=0.41, no compatible plist release yet (checked 2026-07-03).
      # Remove both ignores once plist ships a quick-xml >=0.41 dependency.
      - run: cargo audit --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
